<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentto Studio — Vanilla JS</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 40px; background: #f5f5f5; }
    h1 { color: #333; margin-bottom: 24px; }
    .container { max-width: 800px; margin: 0 auto; }
    #output { margin-top: 16px; padding: 16px; background: #1e1e2d; color: #a2a3b7; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Zentto Studio — Vanilla JS Example</h1>

    <!-- The web component -->
    <zentto-studio-renderer id="form"></zentto-studio-renderer>

    <div id="output"></div>
  </div>

  <script type="module">
    // Import from CDN or node_modules
    import 'https://unpkg.com/@zentto/studio@latest/dist/zentto-studio-renderer.js';

    const form = document.getElementById('form');
    const output = document.getElementById('output');

    // Define the form schema
    form.schema = {
      id: 'contact-form',
      version: '1.0',
      title: 'Contact Form',
      layout: { type: 'grid', columns: 2, gap: 16 },
      sections: [{
        id: 'main',
        title: 'Your Information',
        fields: [
          { id: 'name', type: 'text', field: 'name', label: 'Full Name', required: true, placeholder: 'John Doe' },
          { id: 'email', type: 'email', field: 'email', label: 'Email', required: true, placeholder: 'john@example.com' },
          { id: 'phone', type: 'phone', field: 'phone', label: 'Phone', placeholder: '+1 555 1234' },
          { id: 'country', type: 'select', field: 'country', label: 'Country', props: {
            options: [
              { value: 'US', label: 'United States' },
              { value: 'MX', label: 'Mexico' },
              { value: 'CO', label: 'Colombia' },
              { value: 'ES', label: 'Spain' },
            ]
          }},
          { id: 'message', type: 'textarea', field: 'message', label: 'Message', colSpan: 2, placeholder: 'Tell us more...' },
          { id: 'priority', type: 'rating', field: 'priority', label: 'Priority', props: { mode: 'rating', maxRating: 5 } },
          { id: 'newsletter', type: 'switch', field: 'newsletter', label: 'Subscribe to newsletter' },
        ]
      }],
      actions: [
        { id: 'submit', type: 'submit', label: 'Send Message', variant: 'primary' },
        { id: 'reset', type: 'reset', label: 'Clear', variant: 'secondary' },
      ]
    };

    // Listen for form submission
    form.addEventListener('studio-submit', (e) => {
      output.style.display = 'block';
      output.textContent = 'Form submitted:\n' + JSON.stringify(e.detail.data, null, 2);
    });

    // Listen for field changes
    form.addEventListener('studio-change', (e) => {
      console.log('Field changed:', e.detail.fieldId, '=', e.detail.value);
    });
  </script>
</body>
</html>
