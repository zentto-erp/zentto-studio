name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx turbo build
      - run: npx turbo test
